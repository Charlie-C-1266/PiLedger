<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>PiLedger – Sign in</title>
  <script src="/static/theme-bootstrap.js"></script>
  <link rel="stylesheet" href="/static/login.css" />
</head>
<body class="login-body">

  <div class="login-card">

    <div class="login-logo">
      <svg width="36" height="36" viewBox="0 0 28 28" fill="none">
        <rect width="28" height="28" rx="8" fill="currentColor"/>
        <path d="M7 19l5-5 3 3 6-8" stroke="white" stroke-width="2.2"
              stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span>PiLedger</span>
    </div>

    <div class="login-tabs">
      <button class="login-tab active" id="tab-login"    data-action="showTab" data-arg="login">Sign in</button>
      <button class="login-tab"        id="tab-register" data-action="showTab" data-arg="register">Register</button>
    </div>

    <!-- Sign in form -->
    <form id="form-login" data-action-submit="submitLogin" novalidate>
      <div class="field">
        <label for="login-username">Username</label>
        <input type="text" id="login-username" autocomplete="username"
               spellcheck="false" required autofocus />
      </div>
      <div class="field">
        <label for="login-password">Password</label>
        <input type="password" id="login-password" autocomplete="current-password" required />
      </div>
      <div class="login-error" id="login-error" role="alert"></div>
      <button type="submit" class="btn btn-primary login-submit" id="login-btn">Sign in</button>
    </form>

    <!-- Register form -->
    <form id="form-register" data-action-submit="submitRegister" novalidate style="display:none">
      <div class="field">
        <label for="reg-username">Username</label>
        <input type="text" id="reg-username" autocomplete="username"
               spellcheck="false" required minlength="2" />
      </div>
      <div class="field">
        <label for="reg-password">Password <span class="field-hint">min. 8 characters</span></label>
        <input type="password" id="reg-password" autocomplete="new-password" required minlength="8" />
      </div>
      <div class="field">
        <label for="reg-confirm">Confirm Password</label>
        <input type="password" id="reg-confirm" autocomplete="new-password" required />
      </div>
      <div class="login-error" id="reg-error" role="alert"></div>
      <button type="submit" class="btn btn-primary login-submit" id="reg-btn">Create account</button>
    </form>

    <div class="login-footer">
      <a href="/guide" class="login-docs-link">Documentation</a>
    </div>

  </div>

  <script src="/static/login.js?v=0.29.1"></script>
</body>
</html>
