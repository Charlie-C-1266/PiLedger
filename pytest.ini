[pytest]
testpaths = tests
# Source modules live under src/ after the 2026 restructure; this puts them
# on sys.path so `import app`, `import constants`, etc. resolve.
pythonpath = src
# Default `pytest` invocation runs the fast unit/API suite only. The browser
# E2E tests live under tests/e2e and are opted into explicitly:
#     ./venv/bin/pytest tests/e2e
addopts = --ignore=tests/e2e
markers =
    e2e: end-to-end browser test (requires Playwright + Chromium)
